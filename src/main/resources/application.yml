spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bankdb}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/migration/changelog-master.yml
    parameters:
      ADMIN_EMAIL: ${DB_ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${DB_ADMIN_PASSWORD_HASH}

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

card:
  encryption:
    key: ${CARD_ENCRYPTION_KEY}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
